name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    shell: bash

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
        timeout-minutes: 5

  # Integration tier: real Postgres + Auth via the Supabase local CLI. Boots
  # `supabase start`, applies migrations, then runs the RLS gate suite to
  # prove the database (not just app code) refuses cross-org access. Runs in
  # parallel with `lint-and-test` (needs: []) so the unit suite stays fast
  # and never has to pull the Supabase CLI / Docker images.
  integration:
    runs-on: ubuntu-latest
    needs: []
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase stack
        run: supabase start

      - name: Apply migrations on a clean DB
        run: supabase db reset --no-seed

      - name: Install dependencies
        run: npm ci

      - name: Export Supabase env to GITHUB_ENV
        # `supabase status -o env` prints KEY="value" lines (API_URL, ANON_KEY,
        # SERVICE_ROLE_KEY, …). Strip the literal quotes so GITHUB_ENV stores
        # the bare value. tests/integration/setup/env.ts accepts these CLI
        # names directly, so no remapping is needed.
        run: supabase status -o env | tr -d '"' >> "$GITHUB_ENV"

      - name: Run RLS integration tests
        run: npm run test:integration

      - name: Stop Supabase stack
        if: always()
        run: supabase stop
