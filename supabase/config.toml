# Minimal config.toml so `supabase start` / `supabase db reset` work locally
# and in CI for the integration test tier (see tests/integration/README.md).
# Only the bits ORAT exercises are enabled — auth + db + api. Storage/Realtime/
# Studio/Inbucket/EdgeRuntime/Analytics stay off to keep local startup fast.
# Reference: https://supabase.com/docs/guides/local-development/cli/config

project_id = "construction-pm"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false
sql_paths = []

[realtime]
enabled = false

[studio]
enabled = false

[inbucket]
enabled = false

[storage]
enabled = false

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = false
# Require users to click a confirmation link before they can sign in.
# Locally, mails are captured by the Supabase CLI's mail server (Inbucket).
# In production, SMTP must be configured in the Supabase Dashboard
# (Authentication → Email Templates / SMTP Settings) for the verification
# email to actually be delivered to real inboxes.
enable_confirmations = true
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
